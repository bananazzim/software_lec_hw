
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}스마트 딸기 농장{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://kit.fontawesome.com/726bbd6862.js" crossorigin="anonymous"></script>
</head>
<body class="bg-light"> <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm mb-5">
        <div class="container">
            <a class="navbar-brand font-weight-bold" href="{{ url_for('home') }}" style="color: #dc3545;">
                <i class="fas fa-leaf" style="color: #28a745;"></i> 지형의 스마트팜
            </a>
            <div class="collapse navbar-collapse justify-content-end">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link custom-link" href="{{ url_for('home') }}">홈</a></li>
                    <li class="nav-item"><a class="nav-link custom-link" href="{{ url_for('about') }}">자기소개</a></li>
                    <li class="nav-item"><a class="nav-link custom-link" href="{{ url_for('strawberry') }}">딸기농장 계획</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container min-vh-100">
        {% block content %}
        {% endblock %}
    </div>

    <footer class="bg-white text-center py-4 mt-5 border-top">
        <div class="container">
            <p class="text-muted mb-0">© 2026 스마트 딸기 농장 프로젝트. All rights reserved.</p>
        </div>
    </footer>

</body>
</html>
